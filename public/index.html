<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vaultie — Legal</title>
<style>
  :root { --green:#174E35; --green-dark:#0E3322; --accent:#4CAF72; --ink:#11231A; --subtle:#5B6E64; --line:#E1E8E3; --bg:#F4F8F5; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(135deg,var(--green),var(--green-dark)); color:#fff; padding:24px; }
  .box { text-align:center; max-width:420px; }
  .logo { width:72px; height:72px; border-radius:20px; background:var(--accent); color:var(--green-dark);
    display:flex; align-items:center; justify-content:center; font-weight:900; font-size:38px; margin:0 auto 20px; }
  h1 { margin:0 0 6px; font-size:30px; }
  p { color:rgba(255,255,255,.8); margin:0 0 28px; }
  a.btn { display:block; background:#fff; color:var(--green-dark); text-decoration:none; font-weight:700;
    padding:16px; border-radius:16px; margin-bottom:12px; }
  a.btn.alt { background:rgba(255,255,255,.14); color:#fff; }
</style>
</head>
<body>
  <div class="box">
    <div class="logo">V</div>
    <h1>Vaultie</h1>
    <p>Smarter money habits · Legal documents</p>
    <a class="btn" href="/privacy">Privacy Policy</a>
    <a class="btn alt" href="/terms">Terms of Use</a>
  </div>
</body>
</html>
