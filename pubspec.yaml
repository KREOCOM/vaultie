name: vaultie
description: "Vaultie — a friendly subscription tracker that keeps your recurring spend in one vault."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # Formatting & typography (intl is pinned by flutter_localizations)
  intl: any
  google_fonts: ^6.2.1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  google_sign_in: ^6.2.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0

  # Opens external URLs (privacy policy, terms, app store rating)
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Hive adapter generation (optional — adapters are also hand-written so the
  # project compiles without running build_runner).
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

  # App-icon generation for Android & iOS from assets/icon/app_icon.png.
  # Regenerate with:  dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

# App-icon generator config. Source is a 1024×1024 PNG (no alpha).
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  # Generate the localization sources from lib/l10n/*.arb (see l10n.yaml).
  generate: true
  assets:
    - assets/images/
    - assets/icon/
